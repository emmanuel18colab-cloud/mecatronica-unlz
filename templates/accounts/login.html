{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card p-4">
      <h3>Iniciar sesion</h3>
      <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Usuario</label><input type="text" name="username" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Contrasena</label><input type="password" name="password" class="form-control"></div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>
      <p class="mt-3 text-center">No tenes cuenta? <a href="/accounts/registro/">Registrate</a></p>
    </div>
  </div>
</div>
{% endblock %}
