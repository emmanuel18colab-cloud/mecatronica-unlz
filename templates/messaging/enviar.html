{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h3>Enviar mensaje a {{ destinatario.username }}</h3>
      <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Mensaje</label>
          <textarea name="contenido" class="form-control" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
        <a href="/messaging/" class="btn btn-outline-secondary ms-2">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
