{% extends 'base.html' %}
{% block content %}
<h3>Conversacion con {{ otro_user.username }}</h3>
<div class="card p-3 mb-3" style="max-height:400px; overflow-y:auto;">
  {% for mensaje in mensajes %}
  <div class="mb-3 {% if mensaje.remitente == user %}text-end{% endif %}">
    <div class="d-inline-block p-2 rounded {% if mensaje.remitente == user %}bg-primary text-white{% else %}bg-light{% endif %}">
      {{ mensaje.contenido }}
    </div>
    <div class="text-muted" style="font-size:0.75rem;">{{ mensaje.fecha|date:"d/m/Y H:i" }}</div>
  </div>
  {% endfor %}
</div>
<form method="post" action="/messaging/enviar/{{ otro_user.pk }}/">
  {% csrf_token %}
  <div class="d-flex gap-2">
    <textarea name="contenido" class="form-control" rows="2" placeholder="Escribi un mensaje..."></textarea>
    <button type="submit" class="btn btn-primary">Enviar</button>
  </div>
</form>
{% endblock %}
